    // ========== SPECIAL GADGETS (NO POP DATA) ==========
    const specialNoPopGadgets = new Set([

    function getPopSizes(gadgetName) {
        if (!gadgetName) return null;
        let pops = [];
        let regex = /pop\s+([^,]+(?:,[^,]+)*)/gi;
        let match;
        while ((match = regex.exec(gadgetName)) !== null) {
            let popPart = match[1];
            let tokens = popPart.split(',');
            for (let token of tokens) {
                token = token.trim();
                if (token === '' || token === 'rt' || token === 'pop' || token === 'sp') continue;
                if (token === 'ea') pops.push(2);
                else if (token === 'pc') pops.push(2);
                else if (token === 'psw') pops.push(1);
                else if (token.startsWith('qr')) {
                    for (let i = 0; i < 4; i++) pops.push(2);
                }
                else if (token.startsWith('xr')) {
                    for (let i = 0; i < 2; i++) pops.push(2);
                }
                else if (token.startsWith('er')) pops.push(2);
                else if (token.startsWith('r')) pops.push(1);
            }
        }
        return pops.length ? pops : null;
    }

    const MIN_VALID_CALL_ADDR = 0x8000;

    function normalizeAddress(addr) {
        if (addr === 0x09c21) return 0x09c20;
        if (addr === 0x0947e) return 0x0947c;
        if ((addr & 1) && addrToName.has(addr - 1)) return addr - 1;
        return addr;
    }

    function hexToBytes(hexStr) {
        let clean = hexStr.replace(/\s+/g, '');
        if (!clean) return [];
        if (clean.length % 2) clean = clean.slice(0, -1);
        let bytes = [];
        for (let i = 0; i < clean.length; i += 2)
            bytes.push(parseInt(clean.substr(i,2),16));
        return bytes;
    }

    // ========== KEY MAPPING (little-endian values) ==========
    const keyMap = new Map();
    const keyTable = [
        [0x0180, "SHIFT"], [0x0280, "ALPHA"], [0x0440, "←"], [0x0880, "→"],
        [0x0480, "↑"], [0x0840, "↓"], [0x1080, "MENU"], [0x0140, "OTPN"],
        [0x0240, "CALC"], [0x1040, "∫"], [0x0240, "X"], [0x0120, "⁄"],
        [0x0220, "√"], [0x0420, "x²"], [0x0820, "xˆ"], [0x1020, "log"],
        [0x2020, "IN"], [0x0110, "(-)"], [0x0210, "ĐỘ"], [0x0410, "x^-1"],
        [0x0810, "SIN"], [0x1010, "COS"], [0x2010, "TAN"], [0x0108, "STO"],
        [0x0208, "ENG"], [0x0408, "("], [0x0808, ")"], [0x1008, "S<=>D"],
        [0x2008, "M+"], [0x1004, "AC"], [0x1002, "÷"], [0x1001, "-"],
        [0x4004, "x10"], [0x4001, "="], [0x4010, "0"], [0x0101, "1"],
        [0x0201, "2"], [0x0401, "3"], [0x0102, "4"], [0x0202, "5"],
        [0x0402, "6"], [0x0104, "7"], [0x0204, "8"], [0x0404, "9"],
        [0x0804, "DEL"], [0x0802, "×"], [0x0801, "+"], [0x4008, "."],
        [0x4002, "ANS"]
    ];
    for (let [val, name] of keyTable) {
        keyMap.set(val, name);
    }

    // Parse items from bytes, with dest and src addresses
    function parseToItems(bytes, startAddrDest, startAddrSrc) {
        let items = [];
        let offset = 0;
        let i = 0;
        while (i < bytes.length) {
            let ramAddrDest = startAddrDest + offset;
            let ramAddrSrc = startAddrSrc + offset;
            if (i + 3 < bytes.length) {
                let zz = bytes[i], yy = bytes[i+1], third = bytes[i+2], fourth = bytes[i+3];
                if (third >= 0x30 && third <= 0x39 && fourth === 0x30) {
                    let X = third - 0x30;
                    let rawAddr = (X << 16) | (yy << 8) | zz;
                    if (rawAddr === 0x03030) {
                        // pad: push 2 single bytes
                        items.push({ type: 'data', hexBytes: [zz], value: zz, ramAddrDest, ramAddrSrc });
                        offset++;
                        items.push({ type: 'data', hexBytes: [yy], value: yy, ramAddrDest: startAddrDest+offset, ramAddrSrc: startAddrSrc+offset });
                        i += 2; offset++;
                        continue;
                    }
                    if (rawAddr < MIN_VALID_CALL_ADDR) {
                        // not a call: push 4 single bytes
                        for (let b of [zz, yy, third, fourth]) {
                            items.push({ type: 'data', hexBytes: [b], value: b, ramAddrDest: startAddrDest+offset, ramAddrSrc: startAddrSrc+offset });
                            offset++;
                        }
                        i += 4;
                        continue;
                    }
                    let fixedAddr = normalizeAddress(rawAddr);
                    let name = addrToName.get(fixedAddr);
                    items.push({
                        type: 'call',
                        hexBytes: [zz, yy, third, fourth],
                        addr: fixedAddr,
                        name: name || null,
                        ramAddrDest,
                        ramAddrSrc
                    });
                    i += 4;
                    offset += 4;
                    if (name && !specialNoPopGadgets.has(name)) {
                        let popSizes = getPopSizes(name);
                        if (popSizes && popSizes.length > 0) {
                            let totalBytes = popSizes.reduce((a,b) => a+b, 0);
                            if (i + totalBytes <= bytes.length) {
                                for (let sz of popSizes) {
                                    for (let bi = 0; bi < sz; bi++) {
                                        const b = bytes[i];
                                        items.push({
                                            type: 'data',
                                            hexBytes: [b],
                                            value: b,
                                            ramAddrDest: startAddrDest + offset,
                                            ramAddrSrc: startAddrSrc + offset
                                        });
                                        i++; offset++;
                                    }
                                }
                                continue;
                            }
                        }
                    }
                    continue;
                }
            }
            // Data: push single bytes, each gets own address
            items.push({ type: 'data', hexBytes: [bytes[i]], value: bytes[i], ramAddrDest, ramAddrSrc });
            i++; offset++;
        }
        return items;
    }


    // Renumber labels in document order (label1 first seen top-to-bottom)
    function resequenceLabels(items) {
        let oldToNew = new Map();
        let counter = 1;
        for (let it of items) {
            if (it.type === 'label' && !oldToNew.has(it.label)) {
                oldToNew.set(it.label, `label${counter++}`);
            }
        }
        for (let it of items) {
            if (it.type === 'label') it.label = oldToNew.get(it.label) || it.label;
            if (it.type === 'data' && it.labelRef) {
                it.labelRef.label = oldToNew.get(it.labelRef.label) || it.labelRef.label;
            }
        }
        return items;
    }

    // Function to add label references to items
    function addLabelReferences(items, startAddrDest, startAddrSrc) {
        let addrToItemIdx = new Map();
        for (let idx = 0; idx < items.length; idx++) {
            const it = items[idx];
            addrToItemIdx.set(it.ramAddrDest, idx);
            addrToItemIdx.set(it.ramAddrSrc, idx);
        }

        let labelCounter = 1;
        let labelMap = new Map();

        // Scan pairs of consecutive single-byte items for address references
        for (let idx = 0; idx < items.length - 1; idx++) {
            const it0 = items[idx];
            const it1 = items[idx + 1];
            if (it0.type !== 'data' || it1.type !== 'data') continue;
            if (it0.hexBytes.length !== 1 || it1.hexBytes.length !== 1) continue;
            // little-endian: first byte is low, second is high
            const val = (it1.value << 8) | it0.value;
            if (!addrToItemIdx.has(val)) continue;
            const targetIdx = addrToItemIdx.get(val);
            const targetItem = items[targetIdx];
            let isSrc = false;
            if (targetItem.ramAddrSrc === val) isSrc = true;
            else if (targetItem.ramAddrDest === val) isSrc = false;
            else continue;
            if (!labelMap.has(val)) {
                labelMap.set(val, `label${labelCounter++}`);
            }
            const labelName = labelMap.get(val);
            it0.labelRef = { label: labelName, isSrc, originalValue: val };
            it1.labelSecond = true; // this byte is the high byte of the pair, consumed by it0
            idx++; // skip next item since it's consumed
        }

        let labelItems = [];
        for (let [addr, labelName] of labelMap.entries()) {
            const targetIdx = addrToItemIdx.get(addr);
            if (targetIdx !== undefined) {
                labelItems.push({ type: 'label', label: labelName, insertBefore: targetIdx, addr });
            }
        }
        labelItems.sort((a,b) => b.insertBefore - a.insertBefore);
        for (let li of labelItems) {
            items.splice(li.insertBefore, 0, { type: 'label', label: li.label, addr: li.addr });
        }

        // Merge consecutive labels
        let merged = false;
        do {
            merged = false;
            for (let i = 0; i < items.length - 1; i++) {
                if (items[i].type === 'label' && items[i+1].type === 'label') {
                    let keepLabel = items[i].label;
                    let removeLabel = items[i+1].label;
                    items.splice(i+1, 1);
                    for (let it of items) {
                        if (it.type === 'data' && it.labelRef && it.labelRef.label === removeLabel) {
                            it.labelRef.label = keepLabel;
                        }
                    }
                    merged = true;
                    break;
                }
            }
        } while (merged);

        return items;
    }

    // ========== ADDR NAME MAP ==========

    function setStatus(text, isError = false) {

    function fmtAddr(n) {
        return '0x' + n.toString(16).toLowerCase();
    }

    function getDataDisplay(it) {
        if (labelMode && it.labelRef) {
            const ref = it.labelRef;
            if (ref.isSrc) {
                const offset = currentStartAddrSrc - currentStartAddrDest;
                return `adr_of [+${offset}] ${ref.label}`;
            }
            return `adr_of ${ref.label}`;
        }
        const byteStr = it.hexBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
        let valHex;
        if (hexMode === 'hex') {
            valHex = `hex ${byteStr}`;
        } else {
            // 0x mode: reverse bytes (little-endian to big-endian display)
            const reversed = [...it.hexBytes].reverse().map(b => b.toString(16).padStart(2,'0')).join('');
            valHex = `0x${reversed.toUpperCase()}`;
        }
        let extra = '';
        if (showKeys && it.hexBytes.length === 2 && keyMap.has(it.value))
            extra += ` # [${keyMap.get(it.value)}]`;
        if (showAddrNames && it.hexBytes.length === 2 && addrNameMap.has(it.value))
            extra += ` # ${addrNameMap.get(it.value)}`;
        return valHex + extra;
    }

    // Build a display item = one visual row, which may represent 1 or 2 bytes
    function buildDisplayItems(items) {
        const disp = [];
        let i = 0;
        while (i < items.length) {
            const it = items[i];
            if (it.type === 'label') {
                disp.push({ kind: 'label', item: it, idx: i });
                i++;
                continue;
            }
            if (it.type === 'call') {
                disp.push({ kind: 'call', item: it, idx: i });
                i++;
                continue;
            }
            // data (single byte)
            if (it.labelRef) {
                // This byte + next byte form a 2-byte address reference (adr_of)
                disp.push({ kind: 'labelref', item: it, item2: items[i+1], idx: i });
                i += 2; // skip both bytes
                continue;
            }
            if (it.labelSecond) {
                // consumed by previous labelRef - skip
                i++;
                continue;
            }
            // Check if next item is also a plain data byte (no label/call/labelRef between)
            const next = items[i + 1];
            if (next && next.type === 'data' && !next.labelSecond && !next.labelRef) {
                // pair: show two bytes on one line
                disp.push({ kind: 'data2', item: it, item2: next, idx: i });
                i += 2;
            } else {
                // lone byte
                disp.push({ kind: 'data1', item: it, idx: i });
                i++;
            }
        }
        return disp;
    }

    // Check if a label block (from labelIdx to next label/end) contains only data (no calls)
    function isLabelDataOnly(items, labelIdx) {
        let i = labelIdx + 1;
        while (i < items.length) {
            if (items[i].type === 'label') break; // next label
            if (items[i].type === 'call') return false;
            if (items[i].labelRef || items[i].labelSecond) return false; // address ref
            i++;
        }
        return true;
    }

    // Collapsed label set (label name -> true if collapsed)
    const collapsedLabels = new Set();

    function makeCollapseBtn(labelName, container, labelLineDiv) {
        const btn = document.createElement('button');
        btn.className = 'toggle-call-btn';
        btn.style.fontSize = '9px';
        btn.style.padding = '1px 6px';
        btn.title = 'Gộp hex thành một dòng';
        btn.textContent = collapsedLabels.has(labelName) ? '▶' : '▼';
        btn.onclick = (e) => {
            e.stopPropagation();
            if (collapsedLabels.has(labelName)) collapsedLabels.delete(labelName);
            else collapsedLabels.add(labelName);
            renderDetailedHtml();
        };
        return btn;
    }

    function renderDetailedHtml() {
        const container = document.createElement('div');
        const dispItems = buildDisplayItems(currentItems);
        let i = 0;
        while (i < dispItems.length) {
            const d = dispItems[i];

            if (d.kind === 'label') {
                const it = d.item;
                const isDataOnly = isLabelDataOnly(currentItems, d.idx);
                const isCollapsed = collapsedLabels.has(it.label);

                const lineDiv = document.createElement('div');
                lineDiv.className = 'gadget-line';
                lineDiv.style.paddingLeft = '0';
                const labelSpan = document.createElement('span');
                labelSpan.className = 'label-name';
                labelSpan.textContent = `${it.label}:`;
                lineDiv.appendChild(labelSpan);
                if (isDataOnly) lineDiv.appendChild(makeCollapseBtn(it.label, container, lineDiv));
                if (showAddrs) {
                    const locSpan = document.createElement('span');
                    locSpan.className = 'location';
                    locSpan.textContent = fmtAddr(it.addr);
                    lineDiv.appendChild(locSpan);
                }
                container.appendChild(lineDiv);

                if (isDataOnly && isCollapsed) {
                    // Collect all raw bytes in this label block and show as one "hex ... " line
                    const rawBytes = [];
                    let j = d.idx + 1;
                    while (j < currentItems.length && currentItems[j].type !== 'label') {
                        rawBytes.push(...currentItems[j].hexBytes);
                        j++;
                    }
                    const hexLine = document.createElement('div');
                    hexLine.className = 'gadget-line';
                    hexLine.style.paddingLeft = '16px';
                    const badge = document.createElement('span');
                    badge.className = 'hex-badge';
                    badge.textContent = rawBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                    hexLine.appendChild(badge);
                    const arrow = document.createElement('span');
                    arrow.className = 'arrow';
                    arrow.textContent = '➜';
                    hexLine.appendChild(arrow);
                    const valSpan = document.createElement('span');
                    valSpan.className = 'data-name';
                    valSpan.textContent = 'hex ' + rawBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                    hexLine.appendChild(valSpan);
                    container.appendChild(hexLine);
                    // Skip all display items belonging to this label block
                    i++;
                    while (i < dispItems.length && dispItems[i].kind !== 'label') i++;
                    continue;
                }
                i++;
                continue;
            }

            if (d.kind === 'call') {
                const it = d.item;
                const lineDiv = document.createElement('div');
                lineDiv.className = 'gadget-line';
                lineDiv.style.paddingLeft = '16px';
                const badge = document.createElement('span');
                badge.className = 'hex-badge';
                badge.textContent = it.hexBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
                lineDiv.appendChild(badge);
                const arrow = document.createElement('span');
                arrow.className = 'arrow'; arrow.textContent = '➜';
                lineDiv.appendChild(arrow);
                const addrStr = it.addr.toString(16).toUpperCase().padStart(5, '0');
                const addrSpan = document.createElement('span');
                addrSpan.className = 'addr';
                addrSpan.textContent = addrStr;
                lineDiv.appendChild(addrSpan);
                const nameSpan = document.createElement('span');
                nameSpan.className = it.name ? 'gadget-name' : 'gadget-name-unknown';
                nameSpan.textContent = it.name ? `→ ${it.name}` : `→ call ${addrStr}`;
                lineDiv.appendChild(nameSpan);
                if (showAddrs) {
                    const locSpan = document.createElement('span');
                    locSpan.className = 'location';
                    locSpan.textContent = `${fmtAddr(it.ramAddrDest)} ${fmtAddr(it.ramAddrSrc)}`;
                    lineDiv.appendChild(locSpan);
                }
                container.appendChild(lineDiv);
                i++; continue;
            }

            // data1, data2, labelref
            const it = d.item;
            const it2 = d.item2;
            const lineDiv = document.createElement('div');
            lineDiv.className = 'gadget-line';
            lineDiv.style.paddingLeft = '16px';

            // hex badge: always show raw bytes
            const displayBytes = d.kind === 'data2' || d.kind === 'labelref'
                ? [...it.hexBytes, ...it2.hexBytes]
                : [...it.hexBytes];
            const badge = document.createElement('span');
            badge.className = 'hex-badge';
            badge.textContent = displayBytes.map(b => b.toString(16).padStart(2,'0')).join(' ');
            lineDiv.appendChild(badge);
            const arrow = document.createElement('span');
            arrow.className = 'arrow'; arrow.textContent = '➜';
            lineDiv.appendChild(arrow);

            let display;
            if (d.kind === 'labelref') {
                display = getDataDisplay(it); // adr_of ...
            } else if (d.kind === 'data2') {
                // two paired bytes
                const fakeItem = { hexBytes: displayBytes, value: (it2.value << 8) | it.value, labelRef: null };
                display = getDataDisplay(fakeItem);
            } else {
                display = getDataDisplay(it);
            }

            const valSpan = document.createElement('span');
            valSpan.className = 'data-name';
            valSpan.textContent = `→ ${display}`;
            lineDiv.appendChild(valSpan);
            if (showAddrs) {
                const locSpan = document.createElement('span');
                locSpan.className = 'location';
                locSpan.textContent = `${fmtAddr(it.ramAddrDest)} ${fmtAddr(it.ramAddrSrc)}`;
                lineDiv.appendChild(locSpan);
            }
            container.appendChild(lineDiv);
            i++;
        }
        outputDiv.innerHTML = '';
        outputDiv.appendChild(container);
    }

    function formatSimple() {
        const dispItems = buildDisplayItems(currentItems);
        const lines = [];
        let i = 0;
        while (i < dispItems.length) {
            const d = dispItems[i];
            if (d.kind === 'label') {
                const it = d.item;
                const isDataOnly = isLabelDataOnly(currentItems, d.idx);
                lines.push(`${it.label}:`);
                if (isDataOnly && collapsedLabels.has(it.label)) {
                    // gộp all bytes as hex line
                    const rawBytes = [];
                    let j = d.idx + 1;
                    while (j < currentItems.length && currentItems[j].type !== 'label') {
                        rawBytes.push(...currentItems[j].hexBytes);
                        j++;
                    }
                    lines.push(' hex ' + rawBytes.map(b => b.toString(16).padStart(2,'0')).join(' '));
                    i++;
                    while (i < dispItems.length && dispItems[i].kind !== 'label') i++;
                    continue;
                }
            } else if (d.kind === 'call') {
                const it = d.item;
                lines.push(' ' + (it.name || `call ${it.addr.toString(16).toUpperCase().padStart(5,'0')}`));
            } else if (d.kind === 'labelref') {
                lines.push(' ' + getDataDisplay(d.item));
            } else if (d.kind === 'data2') {
                const displayBytes = [...d.item.hexBytes, ...d.item2.hexBytes];
                const fakeItem = { hexBytes: displayBytes, value: (d.item2.value << 8) | d.item.value, labelRef: null };
                lines.push(' ' + getDataDisplay(fakeItem));
            } else { // data1
                lines.push(' ' + getDataDisplay(d.item));
            }
            i++;
        }
        return lines.join('\n');
    }

    function refreshOutput() {
        if (!currentItems.length) {
            outputDiv.innerHTML = '<div style="color:#b0c0d8; padding:12px;">// No data. Enter hex and press DECOMPILE.</div>';
            updateStats(0, []);
            return;
        }
        if (currentMode === "detail") {
            renderDetailedHtml();
        } else {
            outputDiv.innerText = formatSimple();
        }
        updateStats(currentByteCount, currentItems);
    }

    function decompileAndSet() {
        let rawHex = hexInput.value.trim();
        if (!rawHex) {
            currentItems = [];
            currentByteCount = 0;
            outputDiv.innerHTML = '<div style="color:#b0c0d8; padding:12px;">// Please enter hex program</div>';
            updateStats(0, []);
            setStatus("⚠️ No hex input", true);
            return;
        }
        let startAddrDest = parseInt(startAddrInput.value.trim().toLowerCase(), 16);
        if (isNaN(startAddrDest)) startAddrDest = 0xd730;
        let startAddrSrc = parseInt(backupAddrInput.value.trim().toLowerCase(), 16);
        if (isNaN(startAddrSrc)) startAddrSrc = 0xe9e0;
        currentStartAddrDest = startAddrDest;
        currentStartAddrSrc = startAddrSrc;
        setStatus("⏳ Decompiling...");
        setTimeout(() => {
            try {
                let bytes = hexToBytes(rawHex);
                if (!bytes.length) throw new Error("Invalid hex bytes");
                currentByteCount = bytes.length;
                let items = parseToItems(bytes, startAddrDest, startAddrSrc);
                items = addLabelReferences(items, startAddrDest, startAddrSrc);
                items = resequenceLabels(items);
                currentItems = items;
                refreshOutput();
                setStatus("✅ Decompiled successfully");
            } catch (e) {
                currentItems = [];
                currentByteCount = 0;
                outputDiv.innerHTML = `<div style="color:#f28b82; padding:12px;">// Error: ${e.message}</div>`;
                updateStats(0, []);
                setStatus("❌ Decompile error", true);
            }
        }, 10);
    }

    decompileBtn.onclick = decompileAndSet;
    clearBtn.onclick = () => {
        hexInput.value = "";
        currentItems = [];
        currentByteCount = 0;
        outputDiv.innerHTML = '<div style="color:#b0c0d8; padding:12px;">// Press DECOMPILE</div>';
        updateStats(0, []);
        setStatus("🧹 Cleared");
    };
    copyBtn.onclick = () => {
        let txt = currentMode === "detail" ? formatSimple() : outputDiv.innerText;
        if (!txt || txt.includes("// Press DECOMPILE") || txt.includes("// No data")) {
            setStatus("⚠️ Nothing to copy", true);
            return;
        }
        navigator.clipboard.writeText(txt).then(() => setStatus("📋 Copied output")).catch(() => setStatus("❌ Copy failed", true));
    };
    pasteBtn.onclick = async () => {
        try {
            let text = await navigator.clipboard.readText();
            hexInput.value = text;
            setStatus("📌 Pasted from clipboard");
        } catch { setStatus("⚠️ Cannot read clipboard", true); }
    };

    function setActiveMode(mode) {
        currentMode = mode;
        if (mode === "detail") {
            modeDetail.classList.add('active');
            modeSimple.classList.remove('active');
        } else {
            modeSimple.classList.add('active');
            modeDetail.classList.remove('active');
        }
        refreshOutput();
        setStatus(`🔁 Switched to ${mode === "detail" ? "Detailed" : "Simple"} mode`);
    }
    modeDetail.onclick = () => setActiveMode("detail");
    modeSimple.onclick = () => setActiveMode("simple");

    // ── Settings menu ────────────────────────────────────────────────────
    function setPill(pill, on) {
        pill.classList.toggle('on', on);
    }
    const pillLabels   = document.getElementById('pillLabels');
    const pillKeys     = document.getElementById('pillKeys');
    const pillAddrs    = document.getElementById('pillAddrs');
    const pillAddrNames = document.getElementById('pillAddrNames');
    const pillHexMode  = document.getElementById('pillHexMode');

    // init pills
    setPill(pillLabels, labelMode);
    setPill(pillKeys, showKeys);
    setPill(pillAddrs, showAddrs);
    setPill(pillAddrNames, showAddrNames);
    setPill(pillHexMode, hexMode === '0x');

    document.getElementById('settingLabels').onclick = () => {
        labelMode = !labelMode;
        setPill(pillLabels, labelMode);
        refreshOutput();
        setStatus(labelMode ? "🏷️ Labels ON" : "🏷️ Labels OFF");
    };
    document.getElementById('settingKeys').onclick = () => {
        showKeys = !showKeys;
        setPill(pillKeys, showKeys);
        refreshOutput();
        setStatus(showKeys ? "🔑 Keys ON" : "🔑 Keys OFF");
    };
    document.getElementById('settingAddrs').onclick = () => {
        showAddrs = !showAddrs;
        setPill(pillAddrs, showAddrs);
        refreshOutput();
        setStatus(showAddrs ? "📍 Addresses ON" : "📍 Addresses OFF");
    };
    document.getElementById('settingAddrNames').onclick = () => {
        showAddrNames = !showAddrNames;
        setPill(pillAddrNames, showAddrNames);
        refreshOutput();
        setStatus(showAddrNames ? "🗂️ Addr names ON" : "🗂️ Addr names OFF");
    };
    document.getElementById('settingHexMode').onclick = () => {
        hexMode = hexMode === 'hex' ? '0x' : 'hex';
        setPill(pillHexMode, hexMode === '0x');
        refreshOutput();
        setStatus(`🔢 Format: ${hexMode}`);
    };

    // Settings dropdown open/close
    settingsBtn.onclick = (e) => {
        e.stopPropagation();
        settingsDropdown.classList.toggle('show');
    };
    document.addEventListener('click', () => settingsDropdown.classList.remove('show'));
    settingsDropdown.addEventListener('click', e => e.stopPropagation());

    hexInput.value = "";
    currentItems = [];
    currentByteCount = 0;
    outputDiv.innerHTML = '<div style="color:#b0c0d8; padding:12px;">// Press DECOMPILE</div>';
    updateStats(0, []);
    setStatus("✅ Ready");
</script>
</body>
</html>
