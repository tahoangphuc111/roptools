        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 13, 18, 0.72);
            z-index: 0;
        }

        .container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 500;
            background: linear-gradient(135deg, #fff, #8bcb8b);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 56px;
        }

        .tools {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

            padding: 28px 24px;
            width: 360px;
            transition: all 0.25s ease;
            text-decoration: none;
            display: block;
            position: relative;
            overflow: hidden;
        }
